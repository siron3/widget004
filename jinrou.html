<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐺 人狼メモ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0d0d12;
    --surface: #14141e;
    --card: #1a1a28;
    --border: #2a2a40;
    --accent: #c84b6e;
    --accent2: #5b7cfa;
    --accent3: #e8b84b;
    --wolf: #c84b6e;
    --village: #5b7cfa;
    --dead: #444460;
    --text: #e8e8f0;
    --muted: #7070a0;
    --green: #4bcf8e;
    --purple: #9b6ef5;
    --orange: #f5834a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    padding: 16px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 0.05em;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .setup-area {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
  }
  .setup-area input[type=number] {
    width: 52px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 4px 8px;
    text-align: center;
  }
  .btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.8; }
  .btn.secondary { background: var(--card); border: 1px solid var(--border); color: var(--muted); }

  .day-tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
  .day-tab {
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    transition: all 0.15s;
  }
  .day-tab.active { background: var(--accent); border-color: var(--accent); color: white; }
  .day-tab:hover:not(.active) { border-color: var(--accent); color: var(--text); }
  .day-tab.add-tab { background: transparent; }
  .day-tab.add-tab:hover { color: var(--accent); border-color: var(--accent); }

  .main-grid {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 16px;
  }
  @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-title::before {
    content: '';
    display: inline-block;
    width: 3px; height: 12px;
    border-radius: 2px;
    background: var(--accent);
  }

  /* Players */
  .player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
  .player-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    transition: border-color 0.15s;
  }
  .player-card.dead { opacity: 0.45; background: #111118; border-style: dashed; }
  .player-card.seer { border-color: var(--green); }
  .player-card.medium { border-color: var(--purple); }
  .player-card.knight { border-color: var(--accent3); }
  .player-card.crazy { border-color: var(--orange); }
  .player-card.wolf { border-color: var(--wolf); }
  .player-card.village { border-color: var(--village); }

  .player-number { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .player-name-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    font-weight: 700;
    width: 100%;
    padding: 2px 0;
    margin-bottom: 8px;
    outline: none;
  }
  .player-name-input::placeholder { color: var(--muted); font-weight: 400; }
  .player-name-input:focus { border-bottom-color: var(--accent); }
  .player-role-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
  .role-badge {
    font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 10px; cursor: pointer;
    border: 1px solid transparent; transition: all 0.1s; opacity: 0.4;
  }
  .role-badge.active { opacity: 1; }
  .role-badge.seer { background: rgba(75,207,142,0.15); border-color: var(--green); color: var(--green); }
  .role-badge.medium { background: rgba(155,110,245,0.15); border-color: var(--purple); color: var(--purple); }
  .role-badge.knight { background: rgba(232,184,75,0.15); border-color: var(--accent3); color: var(--accent3); }
  .role-badge.crazy { background: rgba(245,131,74,0.15); border-color: var(--orange); color: var(--orange); }
  .role-badge.wolf { background: rgba(200,75,110,0.15); border-color: var(--wolf); color: var(--wolf); }
  .role-badge.village { background: rgba(91,124,250,0.15); border-color: var(--accent2); color: var(--accent2); }
  .player-status-row { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
  .status-tag { font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 700; }
  .status-tag.executed { background: rgba(200,75,110,0.2); color: var(--wolf); }
  .status-tag.bitten { background: rgba(200,75,110,0.35); color: #ff6090; }
  .status-tag.guarded { background: rgba(232,184,75,0.2); color: var(--accent3); }
  .status-tag.white { background: rgba(91,124,250,0.2); color: var(--accent2); }
  .status-tag.black { background: rgba(200,75,110,0.2); color: var(--wolf); }

  /* Entry rows */
  .result-entry {
    display: grid;
    grid-template-columns: 1fr 1fr 50px 24px;
    gap: 6px;
    align-items: center;
    margin-bottom: 8px;
  }
  .guard-entry {
    display: grid;
    grid-template-columns: 1fr 1fr 24px;
    gap: 6px;
    align-items: center;
    margin-bottom: 8px;
  }
  .result-entry select,
  .guard-entry select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px;
    padding: 5px 6px;
    outline: none;
    width: 100%;
  }
  .result-entry select:focus,
  .guard-entry select:focus { border-color: var(--accent2); }
  .result-tag {
    font-size: 10px; font-weight: 700; padding: 4px 6px;
    border-radius: 8px; text-align: center; cursor: pointer;
  }
  .result-tag.white { background: rgba(91,124,250,0.2); color: var(--accent2); border: 1px solid var(--accent2); }
  .result-tag.black { background: rgba(200,75,110,0.2); color: var(--wolf); border: 1px solid var(--wolf); }
  .del-btn {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 14px; padding: 4px; line-height: 1; border-radius: 4px;
  }
  .del-btn:hover { color: var(--wolf); }

  .event-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .event-label { font-size: 11px; font-weight: 700; color: var(--muted); min-width: 44px; }
  .event-row select {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
  }
  .event-row select.execute { border-color: rgba(200,75,110,0.5); }
  .event-row select.bite { border-color: rgba(200,75,110,0.8); }

  .memo-area {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    padding: 10px;
    resize: vertical;
    min-height: 80px;
    outline: none;
    line-height: 1.7;
  }
  .memo-area:focus { border-color: var(--accent2); }

  /* Noose calc */
  .noose-panel { display: flex; flex-direction: column; gap: 10px; }
  .noose-counts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .noose-count-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; text-align: center; }
  .noose-count-box .count-label { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: 0.08em; margin-bottom: 4px; }
  .noose-count-box .count-num { font-family: 'Share Tech Mono', monospace; font-size: 22px; font-weight: 700; line-height: 1; }
  .noose-count-box.village .count-num { color: var(--accent2); }
  .noose-count-box.wolf .count-num { color: var(--wolf); }
  .noose-result { border-radius: 10px; padding: 12px 14px; font-size: 13px; font-weight: 700; text-align: center; line-height: 1.6; border: 1px solid transparent; }
  .noose-result.safe { background: rgba(75,207,142,0.1); border-color: rgba(75,207,142,0.3); color: var(--green); }
  .noose-result.danger { background: rgba(200,75,110,0.1); border-color: rgba(200,75,110,0.4); color: var(--wolf); }
  .noose-result.critical { background: rgba(200,75,110,0.2); border-color: var(--wolf); color: #ff6090; animation: pulse-border 1.5s ease-in-out infinite; }
  .noose-result.wolf-win { background: rgba(200,75,110,0.25); border-color: var(--wolf); color: var(--wolf); }
  .noose-result.village-win { background: rgba(75,207,142,0.15); border-color: var(--green); color: var(--green); }
  @keyframes pulse-border { 0%,100% { border-color: var(--wolf); } 50% { border-color: #ff6090; box-shadow: 0 0 8px rgba(200,75,110,0.4); } }
  .noose-detail { font-size: 11px; color: var(--muted); text-align: center; line-height: 1.7; white-space: pre-line; }
  .wolf-input-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .wolf-input-row input[type=number] {
    width: 52px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: 'Share Tech Mono', monospace;
    font-size: 14px; padding: 4px 8px; text-align: center; outline: none;
  }
  .wolf-input-row input:focus { border-color: var(--wolf); }

  /* Divine log — 画像スタイル */
  .divine-day-block { margin-bottom: 14px; }
  .divine-day-sep {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; font-weight: 700; color: var(--muted);
    letter-spacing: 0.1em; margin-bottom: 8px;
    padding-bottom: 4px; border-bottom: 1px solid var(--border);
  }
  .divine-role-block { margin-bottom: 8px; }
  .divine-role-header {
    font-size: 12px; font-weight: 700; margin-bottom: 4px;
  }
  .divine-role-header.seer { color: var(--green); }
  .divine-role-header.medium { color: var(--purple); }
  .divine-item {
    display: flex; align-items: center; gap: 5px;
    padding: 2px 0 2px 8px; font-size: 12px; line-height: 1.7;
  }
  .divine-bullet { color: var(--muted); }
  .divine-by-n { color: var(--muted); font-size: 11px; }
  .divine-target-n { color: var(--text); font-weight: 700; }
  .divine-mark { font-size: 15px; font-weight: 900; line-height: 1; }
  .divine-mark.white { color: var(--accent2); }
  .divine-mark.black { color: var(--wolf); }

  /* Kill logs */
  .kill-entry { display: flex; align-items: baseline; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .kill-entry:last-child { border-bottom: none; }
  .kill-day { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--muted); min-width: 28px; }
  .kill-name.execute { color: var(--wolf); font-weight: 700; }
  .kill-name.bite { color: #ff6090; font-weight: 700; }

  /* CO summary */
  .co-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; font-size: 12px; }
  .co-label { min-width: 50px; font-weight: 700; padding-top: 2px; }
  .co-chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .co-chip { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
  .co-chip.seer { background: rgba(75,207,142,0.2); color: var(--green); }
  .co-chip.medium { background: rgba(155,110,245,0.2); color: var(--purple); }
  .co-chip.knight { background: rgba(232,184,75,0.2); color: var(--accent3); }
  .co-chip.crazy { background: rgba(245,131,74,0.2); color: var(--orange); }
  .co-chip.wolf { background: rgba(200,75,110,0.2); color: var(--wolf); }
  .co-chip.village { background: rgba(91,124,250,0.2); color: var(--accent2); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <span style="font-size:24px">🐺</span>
  <h1>人狼メモ</h1>
  <div class="setup-area">
    <span>プレイヤー数</span>
    <input type="number" id="playerCount" value="12" min="4" max="20">
    <button class="btn" onclick="initGame()">ゲーム開始</button>
    <button class="btn secondary" onclick="resetAll()">リセット</button>
  </div>
</header>

<div class="day-tabs" id="dayTabs"></div>

<div class="main-grid">
  <!-- LEFT -->
  <div>
    <div class="section">
      <div class="section-title">プレイヤー / CO状況</div>
      <div class="player-grid" id="playerGrid"></div>
    </div>

    <div class="section">
      <div class="section-title" id="dayEventsTitle">Day 1 — イベント</div>

      <div style="margin-bottom:16px">
        <div style="font-size:11px;font-weight:700;color:var(--green);margin-bottom:8px;letter-spacing:0.08em">🔮 占い結果</div>
        <div id="seerResults"></div>
        <button class="btn secondary" style="font-size:11px;padding:4px 10px" onclick="addSeerResult()">＋ 追加</button>
      </div>

      <div style="margin-bottom:16px">
        <div style="font-size:11px;font-weight:700;color:var(--purple);margin-bottom:8px;letter-spacing:0.08em">👻 霊能結果</div>
        <div id="mediumResults"></div>
        <button class="btn secondary" style="font-size:11px;padding:4px 10px" onclick="addMediumResult()">＋ 追加</button>
      </div>

      <div style="margin-bottom:16px">
        <div style="font-size:11px;font-weight:700;color:var(--accent3);margin-bottom:8px;letter-spacing:0.08em">🛡 騎士護衛先</div>
        <div id="guardEntries"></div>
        <button class="btn secondary" style="font-size:11px;padding:4px 10px" onclick="addGuardEntry()">＋ 追加</button>
      </div>

      <div style="margin-bottom:16px">
        <div style="font-size:11px;font-weight:700;color:var(--accent);margin-bottom:8px;letter-spacing:0.08em">⚖️ 吊り先</div>
        <div class="event-row">
          <span class="event-label">対象</span>
          <select class="execute" id="executeTarget" onchange="updateExecute()"><option value="">— 選択 —</option></select>
        </div>
      </div>

      <div style="margin-bottom:16px">
        <div style="font-size:11px;font-weight:700;color:#ff6090;margin-bottom:8px;letter-spacing:0.08em">🩸 噛み先</div>
        <div class="event-row">
          <span class="event-label">対象</span>
          <select class="bite" id="biteTarget" onchange="updateBite()"><option value="">— 選択 —</option></select>
        </div>
      </div>

      <div>
        <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px;letter-spacing:0.08em">📝 メモ</div>
        <textarea class="memo-area" id="dayMemo" placeholder="気づいたことをメモ…" oninput="saveMemo()"></textarea>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div>
    <div class="section">
      <div class="section-title">🪢 吊り縄計算</div>
      <div class="noose-panel">
        <div class="wolf-input-row">
          <span>人狼の総数（推定）</span>
          <input type="number" id="wolfTotalInput" value="2" min="1" max="10" oninput="renderNooseCalc()">
          <span>人</span>
        </div>
        <div class="noose-counts">
          <div class="noose-count-box village">
            <div class="count-label">村人陣営 生存</div>
            <div class="count-num" id="aliveVillageCount">—</div>
          </div>
          <div class="noose-count-box wolf">
            <div class="count-label">人狼陣営 生存</div>
            <div class="count-num" id="aliveWolfCount">—</div>
          </div>
        </div>
        <div class="noose-result" id="nooseResult">—</div>
        <div class="noose-detail" id="nooseDetail"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">🔮 占い・霊能ログ</div>
      <div id="divineLog"><span style="font-size:12px;color:var(--muted)">占い・霊能結果が記録されます</span></div>
    </div>

    <div class="section">
      <div class="section-title">⚖️ 処刑ログ</div>
      <div id="executeLog"><span style="font-size:12px;color:var(--muted)">吊り先が記録されます</span></div>
    </div>

    <div class="section">
      <div class="section-title">🩸 襲撃ログ</div>
      <div id="biteLog"><span style="font-size:12px;color:var(--muted)">噛み先が記録されます</span></div>
    </div>

    <div class="section">
      <div class="section-title">CO サマリー</div>
      <div id="coSummary"><span style="font-size:12px;color:var(--muted)">役職COがあると表示されます</span></div>
    </div>

    <div class="section">
      <div class="section-title">生存者</div>
      <div id="aliveList" style="font-size:13px;line-height:2"></div>
    </div>
  </div>
</div>

<script>
let state = {
  playerCount: 12,
  players: [],
  days: [],
  currentDay: 0
};

const ROLES = [
  { key:'seer',    label:'占', cls:'seer' },
  { key:'medium',  label:'霊', cls:'medium' },
  { key:'knight',  label:'騎', cls:'knight' },
  { key:'crazy',   label:'狂', cls:'crazy' },
  { key:'wolf',    label:'狼', cls:'wolf' },
  { key:'village', label:'村', cls:'village' },
];

function initGame() {
  const n = parseInt(document.getElementById('playerCount').value) || 12;
  state.playerCount = n;
  state.players = Array.from({length:n}, (_,i) => ({
    id:i+1, name:'', role:null, dead:false, deathDay:null, deathType:null
  }));
  state.days = [createDay(1)];
  state.currentDay = 0;
  renderAll();
}

function createDay(num) {
  return { day:num, execute:'', bite:'', guards:[], seerResults:[], mediumResults:[], memo:'' };
}

function resetAll() {
  if (!confirm('リセットしますか？')) return;
  state = { playerCount:12, players:[], days:[], currentDay:0 };
  renderAll();
}

function renderAll() {
  renderDayTabs();
  renderPlayers();
  renderDayEvents();
  renderSidebar();
}

function renderSidebar() {
  renderNooseCalc();
  renderDivineLog();
  renderExecuteLog();
  renderBiteLog();
  renderCoSummary();
  renderAliveList();
}

// --- Day tabs ---
function renderDayTabs() {
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = '';
  state.days.forEach((d,i) => {
    const t = document.createElement('div');
    t.className = 'day-tab' + (i===state.currentDay?' active':'');
    t.textContent = `Day ${d.day}`;
    t.onclick = () => { state.currentDay=i; renderAll(); };
    tabs.appendChild(t);
  });
  const add = document.createElement('div');
  add.className = 'day-tab add-tab';
  add.textContent = '＋ 次の日';
  add.onclick = () => {
    state.days.push(createDay(state.days.length+1));
    state.currentDay = state.days.length-1;
    renderAll();
  };
  tabs.appendChild(add);
}

// --- Players ---
function renderPlayers() {
  const grid = document.getElementById('playerGrid');
  grid.innerHTML = '';
  state.players.forEach(p => {
    const card = document.createElement('div');
    card.className = 'player-card' + (p.dead?' dead':'') + (p.role?' '+p.role:'');
    card.innerHTML = `
      <div class="player-number">#${p.id}</div>
      <input class="player-name-input" placeholder="名前" value="${esc(p.name)}"
        oninput="updatePlayerName(${p.id-1},this.value)">
      <div class="player-role-row">
        ${ROLES.map(r=>`<span class="role-badge ${r.cls}${p.role===r.key?' active':''}"
          onclick="toggleRole(${p.id-1},'${r.key}')">${r.label}</span>`).join('')}
      </div>
      <div class="player-status-row">
        ${p.dead?`<span class="status-tag ${p.deathType}">${p.deathType==='executed'?'⚖️ 吊り':'🩸 噛み'} D${p.deathDay}</span>`:''}
        ${getPlayerTags(p.id)}
      </div>`;
    grid.appendChild(card);
  });
}

function getPlayerTags(pid) {
  let t = '';
  state.days.forEach(d => {
    d.seerResults.forEach(r => {
      if (r.target==pid && r.result)
        t += `<span class="status-tag ${r.result}" title="D${d.day}占い">${r.result==='white'?'白':'黒'}</span>`;
    });
    d.mediumResults.forEach(r => {
      if (r.target==pid && r.result)
        t += `<span class="status-tag ${r.result}" title="D${d.day}霊能">${r.result==='white'?'霊白':'霊黒'}</span>`;
    });
    if (d.guards && d.guards.some(g=>g.target && parseInt(g.target)===pid))
      t += `<span class="status-tag guarded" title="D${d.day}護衛">🛡</span>`;
  });
  return t;
}

// --- Day events ---
function renderDayEvents() {
  if (!state.days.length) return;
  const day = state.days[state.currentDay];
  document.getElementById('dayEventsTitle').textContent = `Day ${day.day} — イベント`;

  const aliveOpts = aliveOptions();
  const allOpts   = allOptions();
  const pOpts     = playerOptions();

  renderResultEntries('seerResults',   day.seerResults,   allOpts, pOpts);
  renderResultEntries('mediumResults', day.mediumResults, allOpts, pOpts);
  renderGuardEntries(day.guards, aliveOpts, pOpts);
  setSelect('executeTarget', aliveOpts, day.execute);
  setSelect('biteTarget',    aliveOpts, day.bite);
  document.getElementById('dayMemo').value = day.memo || '';
}

function renderResultEntries(cid, results, targetOpts, byOpts) {
  const wrap = document.getElementById(cid);
  wrap.innerHTML = '';
  results.forEach((r,i) => {
    const row = document.createElement('div');
    row.className = 'result-entry';

    const bySel = mkSel([{id:'',label:'— COした人 —'},...byOpts], r.by,
      v => { r.by=v; renderDivineLog(); });

    const tgSel = mkSel([{id:'',label:'— 対象 —'},...targetOpts], r.target,
      v => { r.target=v; renderPlayers(); renderDivineLog(); });

    const resBtn = document.createElement('span');
    resBtn.className = 'result-tag '+(r.result||'white');
    resBtn.textContent = r.result==='black'?'黒':'白';
    resBtn.onclick = () => {
      r.result = r.result==='black'?'white':'black';
      resBtn.className = 'result-tag '+r.result;
      resBtn.textContent = r.result==='black'?'黒':'白';
      renderPlayers(); renderDivineLog();
    };

    const del = mkDel(() => {
      results.splice(i,1);
      renderResultEntries(cid,results,targetOpts,byOpts);
      renderPlayers(); renderDivineLog();
    });

    row.appendChild(bySel); row.appendChild(tgSel);
    row.appendChild(resBtn); row.appendChild(del);
    wrap.appendChild(row);
  });
}

function renderGuardEntries(guards, aliveOpts, pOpts) {
  const wrap = document.getElementById('guardEntries');
  wrap.innerHTML = '';
  guards.forEach((g,i) => {
    const row = document.createElement('div');
    row.className = 'guard-entry';

    const bySel = mkSel([{id:'',label:'— 騎士 —'},...pOpts], g.by,
      v => { g.by=v; renderSidebar(); });

    const tgSel = mkSel([{id:'',label:'— 護衛先 —'},...aliveOpts], g.target,
      v => { g.target=v; renderPlayers(); renderSidebar(); });

    const del = mkDel(() => {
      guards.splice(i,1);
      renderGuardEntries(guards, aliveOpts, pOpts);
      renderPlayers(); renderSidebar();
    });

    row.appendChild(bySel); row.appendChild(tgSel); row.appendChild(del);
    wrap.appendChild(row);
  });
}

// --- Sidebar ---
function renderNooseCalc() {
  if (!state.players.length) return;
  const wolfTotal = parseInt(document.getElementById('wolfTotalInput')?.value)||2;
  const alive = state.players.filter(p=>!p.dead).length;
  const deadW = state.players.filter(p=>p.dead&&p.role==='wolf').length;
  const aliveW = Math.max(0, wolfTotal-deadW);
  const aliveV = alive-aliveW;

  document.getElementById('aliveVillageCount').textContent = aliveV;
  document.getElementById('aliveWolfCount').textContent    = aliveW;

  const res  = document.getElementById('nooseResult');
  const det  = document.getElementById('nooseDetail');

  if (aliveW===0) {
    res.className='noose-result village-win'; res.textContent='🎉 村人陣営の勝利！';
    det.textContent='人狼が全滅しました'; return;
  }
  if (aliveW>=aliveV) {
    res.className='noose-result wolf-win'; res.textContent='💀 人狼陣営の勝利';
    det.textContent=`人狼${aliveW}人 ≥ 村人陣営${aliveV}人`; return;
  }
  const safe = aliveV-aliveW-1;
  if (safe<=0) {
    res.className='noose-result critical';
    res.textContent='⚠️ 次の吊りで人狼を当てないと負け！';
    det.textContent=`村人${aliveV}人 / 人狼${aliveW}人\nあと外せる吊りは 0 回`;
  } else if (safe===1) {
    res.className='noose-result danger';
    res.textContent=`あと ${safe} 回 外せる`;
    det.textContent=`村人${aliveV}人 / 人狼${aliveW}人\n次の次には必ず当てる必要あり`;
  } else {
    res.className='noose-result safe';
    res.textContent=`あと ${safe} 回 外せる`;
    det.textContent=`村人${aliveV}人 / 人狼${aliveW}人\n生存${alive}人中 推定人狼${aliveW}人`;
  }
}

// 画像の形式：【 占い 】・COした人\n　対象 ○●
function renderDivineLog() {
  const wrap = document.getElementById('divineLog');
  if (!wrap) return;

  const blocks = [];
  state.days.forEach(d => {
    const sE = d.seerResults.filter(r=>r.target).map(r=>({
      byName: pName(r.by), targetName: pName(r.target), result: r.result||'white'
    }));
    const mE = d.mediumResults.filter(r=>r.target).map(r=>({
      byName: pName(r.by), targetName: pName(r.target), result: r.result||'white'
    }));
    if (sE.length||mE.length) blocks.push({day:d.day, sE, mE});
  });

  if (!blocks.length) {
    wrap.innerHTML='<span style="font-size:12px;color:var(--muted)">占い・霊能結果が記録されます</span>';
    return;
  }

  wrap.innerHTML = blocks.map(b=>`
    <div class="divine-day-block">
      <div class="divine-day-sep">DAY ${b.day}</div>
      ${b.sE.length?`
        <div class="divine-role-block">
          <div class="divine-role-header seer">【 占い 】</div>
          ${b.sE.map(e=>`
            <div class="divine-item">
              <span class="divine-bullet">・</span>
              ${e.byName?`<span class="divine-by-n">${esc(e.byName)}</span>`:''}
              <span class="divine-target-n">${esc(e.targetName)}</span>
              <span class="divine-mark ${e.result}">${e.result==='black'?'●':'○'}</span>
            </div>`).join('')}
        </div>`:''}
      ${b.mE.length?`
        <div class="divine-role-block">
          <div class="divine-role-header medium">【 霊媒 】</div>
          ${b.mE.map(e=>`
            <div class="divine-item">
              <span class="divine-bullet">・</span>
              ${e.byName?`<span class="divine-by-n">${esc(e.byName)}</span>`:''}
              <span class="divine-target-n">${esc(e.targetName)}</span>
              <span class="divine-mark ${e.result}">${e.result==='black'?'●':'○'}</span>
            </div>`).join('')}
        </div>`:''}
    </div>`).join('');
}

function renderExecuteLog() {
  const wrap = document.getElementById('executeLog');
  if (!wrap) return;
  const list = state.days.filter(d=>d.execute).map(d=>({day:d.day, name:pName(d.execute)}));
  wrap.innerHTML = list.length
    ? list.map(e=>`<div class="kill-entry"><span class="kill-day">D${e.day}</span><span class="kill-name execute">: ${esc(e.name)}</span></div>`).join('')
    : '<span style="font-size:12px;color:var(--muted)">吊り先が記録されます</span>';
}

function renderBiteLog() {
  const wrap = document.getElementById('biteLog');
  if (!wrap) return;
  const list = state.days.filter(d=>d.bite).map(d=>({day:d.day, name:pName(d.bite)}));
  wrap.innerHTML = list.length
    ? list.map(e=>`<div class="kill-entry"><span class="kill-day">D${e.day}</span><span class="kill-name bite">: ${esc(e.name)}</span></div>`).join('')
    : '<span style="font-size:12px;color:var(--muted)">噛み先が記録されます</span>';
}

function renderCoSummary() {
  const wrap = document.getElementById('coSummary');
  const groups = {};
  state.players.forEach(p=>{ if(p.role){ (groups[p.role]=groups[p.role]||[]).push(p); }});
  if (!Object.keys(groups).length) {
    wrap.innerHTML='<span style="font-size:12px;color:var(--muted)">役職COがあると表示されます</span>'; return;
  }
  const lbl={seer:'占い師',medium:'霊能者',knight:'騎士',crazy:'狂人',wolf:'人狼',village:'村人'};
  const clr={seer:'var(--green)',medium:'var(--purple)',knight:'var(--accent3)',crazy:'var(--orange)',wolf:'var(--wolf)',village:'var(--accent2)'};
  wrap.innerHTML = Object.entries(groups).map(([role,ps])=>`
    <div class="co-row">
      <span class="co-label" style="color:${clr[role]||'var(--muted)'}">${lbl[role]||role}</span>
      <div class="co-chips">${ps.map(p=>`<span class="co-chip ${role}">${esc(p.name||'#'+p.id)}${p.dead?' 💀':''}</span>`).join('')}</div>
    </div>`).join('');
}

function renderAliveList() {
  const wrap = document.getElementById('aliveList');
  const alive = state.players.filter(p=>!p.dead);
  wrap.innerHTML = alive.length
    ? alive.map(p=>`<span style="margin-right:8px">${esc(p.name||'#'+p.id)}</span>`).join('')
    : '<span style="color:var(--muted)">—</span>';
}

// --- Actions ---
function updatePlayerName(idx,val) {
  state.players[idx].name = val;
  renderAll();
}
function toggleRole(idx,role) {
  state.players[idx].role = state.players[idx].role===role?null:role;
  renderPlayers(); renderCoSummary();
}
function updateExecute() {
  const day = state.days[state.currentDay];
  const prev = day.execute;
  day.execute = document.getElementById('executeTarget').value;
  if (prev) { const o=state.players.find(p=>p.id==prev); if(o){o.dead=false;o.deathDay=null;o.deathType=null;} }
  if (day.execute) { const p=state.players.find(p=>p.id==day.execute); if(p){p.dead=true;p.deathDay=day.day;p.deathType='executed';} }
  renderPlayers(); renderSidebar();
}
function updateBite() {
  const day = state.days[state.currentDay];
  const prev = day.bite;
  day.bite = document.getElementById('biteTarget').value;
  if (prev) { const o=state.players.find(p=>p.id==prev); if(o&&o.deathType==='bitten'){o.dead=false;o.deathDay=null;o.deathType=null;} }
  if (day.bite) { const p=state.players.find(p=>p.id==day.bite); if(p){p.dead=true;p.deathDay=day.day;p.deathType='bitten';} }
  renderPlayers(); renderSidebar();
}
function addSeerResult()   { state.days[state.currentDay].seerResults.push({by:'',target:'',result:'white'}); renderDayEvents(); }
function addMediumResult() { state.days[state.currentDay].mediumResults.push({by:'',target:'',result:'white'}); renderDayEvents(); }
function addGuardEntry()   { state.days[state.currentDay].guards.push({by:'',target:''}); renderDayEvents(); }
function saveMemo()        { state.days[state.currentDay].memo = document.getElementById('dayMemo').value; }

// --- Helpers ---
function aliveOptions()  { return state.players.filter(p=>!p.dead).map(p=>({id:p.id,label:p.name||`#${p.id}`})); }
function allOptions()    { return state.players.map(p=>({id:p.id,label:(p.name||`#${p.id}`)+(p.dead?' 💀':'')})); }
function playerOptions() { return state.players.map(p=>({id:p.id,label:(p.name||`#${p.id}`)+(p.dead?' 💀':'')})); }

function pName(id) {
  if (!id) return '';
  const p = state.players.find(p=>p.id==id);
  return p?(p.name||`#${p.id}`):`#${id}`;
}

function setSelect(id, opts, selected) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = '<option value="">— 選択 —</option>' +
    opts.map(o=>`<option value="${o.id}" ${o.id==selected?'selected':''}>${esc(o.label)}</option>`).join('');
}

function mkSel(opts, selected, onChange) {
  const sel = document.createElement('select');
  sel.innerHTML = opts.map(o=>`<option value="${esc(String(o.id))}" ${o.id==selected?'selected':''}>${esc(o.label)}</option>`).join('');
  sel.onchange = e => onChange(e.target.value);
  return sel;
}

function mkDel(onClick) {
  const btn = document.createElement('button');
  btn.className='del-btn'; btn.textContent='✕';
  btn.onclick = onClick;
  return btn;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

initGame();
</script>
